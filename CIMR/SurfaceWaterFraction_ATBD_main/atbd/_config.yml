# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

title: CIMR Surface Water Fraction ATBD
author: Roberto Fernandez-Moran, Andrés Terrer-Gómez, Moritz Link, María Piles.
logo: logo.jpg

# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  execute_notebooks: off

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: atbd.tex

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - biblio.bib
  
# Format the citation style
sphinx:
  config:
    bibtex_reference_style: author_year
    html_show_copyright: false
    latex_elements:
      extraclassoptions: openany
      papersize: a4
#  extra_extensions:
#    - sphinxcontrib.mermaid



# Information about where the book exists on the web
repository:
  url: https://github.com/CIMR-L2PAD/SurfaceWaterFraction_ATBD  # Online location of your book
  path_to_book: atbd  # Optional path to your book, relative to the repository root
  branch: main  # Which branch of the repository should be used when creating links (optional)

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
html:
  use_issues_button: false
  use_repository_button: true
  extra_footer: |
    <p>
    This ATBD was developed in the context of the ESA-funded CIMR L2PAD project (2023-2027) (ESA 4000143081/23/I-NS).
    </p>
  announcement: This is V2 of the ATBD, prepared for DDR (November 2025)

